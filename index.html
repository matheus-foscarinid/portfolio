<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">

    <link rel="icon" href="/favicon.ico">

    <link
      rel="preload"
      as="image"
      imagesrcset="
        /images/me/me_w_280.webp 280w,
        /images/me/me_w_794.webp 794w,
        /images/me/me_w_1130.webp 1130w,
        /images/me/me_w_1440.webp 1440w
      "
      imagesizes="(max-width: 768px) 280px, 380px"
      fetchpriority="high"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;700;800;900&family=Fira+Code&display=swap"
      media="print"
      onload="this.media='all'"
    >
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;700;800;900&family=Fira+Code&display=swap">
    </noscript>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Matheus is a fullstack mid-level developer based in Rio Grande do Sul, Brazil. Specialized in creating high-quality, scalable applications with exceptional UX. With expertise in both front-end and back-end, I'm able to build end-to-end solutions that are efficient. Whether it's complex architecture or intuitive user interfaces."
    >

    <title>Matheus Dias | Fullstack Developer</title>

    <script>
      // set theme before first paint so the loader and app don't flash the wrong palette
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbf1c7;
      }
      html[data-theme="dark"] #app-loader { background: #282828; }
      html[data-theme="dark"] { background: #282828; }

      #app-loader .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid rgba(214, 93, 14, 0.2);
        border-top-color: #d65d0e;
        animation: app-loader-spin 0.8s linear infinite;
      }
      html[data-theme="dark"] #app-loader .spinner {
        border-color: rgba(211, 134, 155, 0.2);
        border-top-color: #d3869b;
      }

      @keyframes app-loader-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .spinner { animation-duration: 2.4s; }
      }
    </style>
  </head>

  <div id="app">
    <div id="app-loader">
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</html>
